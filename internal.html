<html>
    <head>
        <style>
            .card{
                background-color: blueviolet;
                border-radius: 10px;
                box-shadow: 0 4px 8px rgba(red, green, blue, alpha);
                padding: 20px;
                margin: 20px auto;
                max-width: 400px;
                transition: transform 0.3s;
            }
            .card:hover{
                transform: translateY(-5px);
                box-shadow: 0 8px 16px rgba(red, green, blue, alpha);
            }
            .card-title{
                color: brown;
                font-size: 24px;
                margin-bottom: 10px;
            }
            .card-text{
                color: chartreuse;
                line-height: 1.5;
            }
            .btn{
                background-color: blue;
                color: pink;
                padding: 10px 20px;
                border: non;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
            }
            .btn:hover{
                background-color: chocolate;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2 class="card-title"> Beatiful Card</h2>
            <p class="card-text"> This is a card component style with internal css. It has hover effects and a modern design.</p>
            <button class="btn"> Click me</button>
        </div>
    </body>
</html>
